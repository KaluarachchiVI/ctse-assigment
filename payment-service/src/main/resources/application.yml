server:
  port: ${SERVER_PORT:8082}

spring:
  application:
    name: payment-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://localhost:27017/payments-db}
  mail:
    host: ${SMTP_HOST:localhost}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USERNAME:}
    password: ${SMTP_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SMTP_AUTH:true}
          starttls:
            enable: ${SMTP_STARTTLS:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info

booking:
  service:
    base-url: ${BOOKING_SERVICE_BASE_URL:http://localhost:8080}

user:
  service:
    base-url: ${USER_SERVICE_BASE_URL:http://localhost:8081}
    # When true, payment-service loads email/name from user-service for logged-in checkout.
    enabled: ${USER_SERVICE_ENABLED:true}

payment:
  gateway:
    provider: ${PAYMENT_GATEWAY_PROVIDER:mock}
    stripe:
      api-key: ${STRIPE_API_KEY:dummy}
      # ISO code (e.g. usd, lkr). Must be enabled for your Stripe account; `usd` avoids cross-currency minimum issues.
      checkout-currency: ${STRIPE_CHECKOUT_CURRENCY:usd}

# SmtpEmailService "From" header — defaults to SMTP_USERNAME when MAIL_FROM is unset
mail:
  from: ${MAIL_FROM:${SMTP_USERNAME:no-reply@motionpictures.local}}

