apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  labels:
    app: payment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
    spec:
      serviceAccountName: payment-service-sa
      containers:
        - name: payment-service
          image: ${PAYMENT_IMAGE}
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
          env:
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: payment-service-secrets
                  key: mongodb-uri
            - name: BOOKING_SERVICE_BASE_URL
              value: "http://booking-service"
            - name: USER_SERVICE_BASE_URL
              value: "http://user-service"
            - name: USER_SERVICE_ENABLED
              value: "false"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8082
            initialDelaySeconds: 30
            periodSeconds: 30

