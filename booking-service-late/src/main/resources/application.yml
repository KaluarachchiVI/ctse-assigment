server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: booking-service
  data:
    mongodb:
      uri: ${MONGO_URI:mongodb://localhost:27017/microservice}

management:
  endpoints:
    web:
      exposure:
        include: health,info

booking:
  admin:
    username: ${BOOKING_ADMIN_USERNAME:admin}
    password: ${BOOKING_ADMIN_PASSWORD:admin-pass}
